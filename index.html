<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
    <title>TOP Calculator LOL!</title>
</head>

<body>
    
    <div class="header">
      <div class="header__title">
        <p>"The Odin Project Calculator"</p>
      </div>
      <div class="header__description">
        <p>Just a silly calculator. Do not press the "LOL" button! You've been warned</p>
      </div>

    </div>

    <div class="calculator">

      <div class="calculator__controls">
        
        <div class="calculator__display">
            
          <div class="calculator__output">
            <span class="calculator__operations" data-operation="one"></span>
            <span class="calculator__equal-symbol" data-symbol="equal">=</span>
            <span class="calculator__result" data-result="one"></span>
          </div>

          <div class="calculator__output">
            <span class="calculator__operations" data-operation="two"></span>
            <span class="calculator__equal-symbol" data-symbol="equal">=</span>
            <span class="calculator__result" data-result="two"></span>
          </div>

          <div class="calculator__output">
            <span class="calculator__operations" data-operation="three"></span>
            <span class="calculator__equal-symbol" data-symbol="equal">=</span>
            <span class="calculator__result" data-result="three"></span>
          </div>

          <div class="calculator__output">
            <span class="calculator__operations" data-operation="four"></span>
            <span class="calculator__equal-symbol" data-symbol="equal">=</span>
            <span class="calculator__result" data-result="four"></span>
          </div>


          <div class="calculator__output--main">
            <span class="calculator__result--main" data-result="main"></span>
          </div>
        </div>
        
        <div class="calculator__keypad">

  <div class="calculator__row">
            <button type="button" class="calculator__key calculator__key--num" data-key="7">7</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="8">8</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="9">9</button>
            <button type="button" class="calculator__key calculator__key--action" data-key="del">DEL</button>
            <button type="button" class="calculator__key calculator__key--action" data-key="ac">AC</button>
  </div>

          <div class="calculator__row">
            <button type="button" class="calculator__key calculator__key--num" data-key="4">4</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="5">5</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="6">6</button>
            <button type="button" class="calculator__key calculator__key--operator" data-key="×">×</button>
            <button type="button" class="calculator__key calculator__key--operator" data-key="÷">÷</button>
          </div>

          <div class="calculator__row">
            <button type="button" class="calculator__key calculator__key--num" data-key="1">1</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="2">2</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="3">3</button>
            <button type="button" class="calculator__key calculator__key--operator" data-key="+">+</button>
            <button type="button" class="calculator__key calculator__key--operator" data-key="-">-</button>
          </div>

          <div class="calculator__row">
            <button type="button" class="calculator__key calculator__key--num" data-key="0">0</button>
            <button type="button" class="calculator__key calculator__key--num" data-key=".">.</button>
            <button type="button" class="calculator__key calculator__key--action" data-key="lol">LOL</button>
            <button type="button" class="calculator__key calculator__key--action" data-key="ans">Ans</button>
            <button type="button" class="calculator__key calculator__key--action calculator__key--result" data-key="calculate">=</button>
          </div>
      
        </div>

      </div>
      
    </div>

</body>

</html>
