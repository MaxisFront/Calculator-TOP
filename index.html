<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
    <title>TOP Calculator LOL!</title>
</head>

<body>
    
    <div class="header">
      <div class="header__title">
        <p>"The Odin Project Calculator"</p>
      </div>
      <div class="header__description">
        <p>Just a silly calculator. Do not press the "LOL" button! You've been warned</p>
      </div>

    </div>

    <div class="calculator">

      <div class="calculator__controls">
        
        <div class="calculator__display">
            
          <div class="calculator__output">
            <span class="calculator__operations" data-operation="one">22222222*22</span>
            <span class="calculator__equal-symbol" data-symbol="equal">=</span>
            <span class="calculator__result" data-result="one">4333333</span>
          </div>

          <div class="calculator__output">
            <span class="calculator__operations" data-operation="two">2+2</span>
            <span class="calculator__equal-symbol" data-symbol="equal">=</span>
            <span class="calculator__result" data-result="two">4</span>
          </div>

          <div class="calculator__output">
            <span class="calculator__operations" data-operation="three">22222222+2</span>
            <span class="calculator__equal-symbol" data-symbol="equal">=</span>
            <span class="calculator__result" data-result="three">42222222222222222222222</span>
          </div>

          <div class="calculator__output">
            <span class="calculator__operations" data-operation="four">2+2</span>
            <span class="calculator__equal-symbol" data-symbol="equal">=</span>
            <span class="calculator__result" data-result="four">4</span>
          </div>


          <div class="calculator__output--main">
            <span class="calculator__main-result" data-result="main">239x233+23</span>
          </div>
        </div>
        
        <div class="calculator__keypad">

  <div class="calculator__row">
            <button type="button" class="calculator__key calculator__key--num" data-key="">7</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="">8</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="">9</button>
            <button type="button" class="calculator__key calculator__key--action" data-key="">DEL</button>
            <button type="button" class="calculator__key calculator__key--action" data-key="">AC</button>
  </div>

          <div class="calculator__row">
            <button type="button" class="calculator__key calculator__key--num" data-key="">4</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="">5</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="">6</button>
            <button type="button" class="calculator__key calculator__key--operator" data-key="">×</button>
            <button type="button" class="calculator__key calculator__key--operator" data-key="">÷</button>
          </div>

          <div class="calculator__row">
            <button type="button" class="calculator__key calculator__key--num" data-key="">1</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="">2</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="">3</button>
            <button type="button" class="calculator__key calculator__key--operator" data-key="">+</button>
            <button type="button" class="calculator__key calculator__key--operator" data-key="">-</button>
          </div>

          <div class="calculator__row">
            <button type="button" class="calculator__key calculator__key--num" data-key="">0</button>
            <button type="button" class="calculator__key calculator__key--num" data-key="">.</button>
            <button type="button" class="calculator__key calculator__key--action" data-key="">LOL</button>
            <button type="button" class="calculator__key calculator__key--action" data-key="">Ans</button>
            <button type="button" class="calculator__key calculator__key--result" data-key="">=</button>
          </div>
      
        </div>

      </div>
      
    </div>

</body>

</html>
